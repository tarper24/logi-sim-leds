name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxxf86vm-dev \
            libudev-dev \
            pkg-config

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -ldflags '-s -w' -o logi-sim-leds ./cmd/logi-sim-leds

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: logi-sim-leds

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -ldflags '-s -w -H windowsgui' -o logi-sim-leds.exe ./cmd/logi-sim-leds
        env:
          CGO_ENABLED: "1"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: logi-sim-leds.exe
